                  properties:
                    configMapKeyRef:
                      description: Reference to a ConfigMap key.
                      nullable: true
                      properties:
                        key:
                          description: Key within the Secret or ConfigMap.
                          type: string
                        name:
                          description: Name of the Secret or ConfigMap.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    name:
                      description: Environment variable name.
                      type: string
                    secretKeyRef:
                      description: Reference to a Secret key.
                      nullable: true
                      properties:
                        key:
                          description: Key within the Secret or ConfigMap.
                          type: string
                        name:
                          description: Name of the Secret or ConfigMap.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    value:
                      description: Literal value.
                      nullable: true
                      type: string
                  required:
                  - name
                  type: object
                type: array
              nodeSelector:
                additionalProperties:
                  type: string
                description: Select nodes by labels. If empty, targets all nodes.
                nullable: true
                type: object
              overlayName:
                description: Named overlay group for shared overlay filesystem. Multiple
                  ReaperDaemonJobs with the same overlayName share an overlay, enabling
