              \ configuration tasks like Ansible playbooks that compose via shared\
              \ overlays.\n\nController layering: ReaperDaemonJob \u2192 ReaperPod\
              \ \u2192 Pod."
            properties:
              after:
                description: 'Dependency ordering: names of other ReaperDaemonJobs
