apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: reaperoverlays.reaper.io
spec:
  group: reaper.io
  names:
    kind: ReaperOverlay
    plural: reaperoverlays
    shortNames:
    - rovl
    singular: reaperoverlay
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.resetGeneration
      name: Reset Gen
      type: integer
    - jsonPath: .status.observedResetGeneration
      name: Observed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ReaperOverlaySpec via `CustomResource`
        properties:
          spec:
            description: ReaperOverlay is a PVC-like resource that manages named overlay
              filesystem lifecycles independently from ReaperPod workloads. It provides
              Kubernetes-native overlay creation, inspection, reset, and deletion
              without requiring node access.
            properties:
              resetGeneration:
                default: 0
                description: Monotonically increasing counter. Increment to trigger
                  a reset on all nodes. Controller compares against status.observedResetGeneration
                  to detect pending resets.
                format: int64
                type: integer
              resetPolicy:
                default: Manual
                description: 'When to automatically reset the overlay. - Manual: only
                  reset when resetGeneration is incremented (default) - OnFailure:
                  reset when a ReaperPod using this overlay fails - OnDelete: reset
                  when the ReaperOverlay is deleted and recreated'
                type: string
            type: object
          status:
            description: Status of a ReaperOverlay.
            nullable: true
            properties:
              message:
                description: Human-readable message about the current state.
                nullable: true
                type: string
              nodes:
                description: Per-node overlay state.
                items:
                  description: Per-node overlay status.
                  properties:
                    lastResetTime:
                      description: ISO 8601 timestamp of last reset on this node.
                      nullable: true
                      type: string
                    nodeName:
                      description: Name of the node.
                      type: string
                    ready:
                      default: false
                      description: Whether the overlay is available on this node.
                      type: boolean
                  required:
                  - nodeName
                  type: object
                type: array
              observedResetGeneration:
                default: 0
                description: Last resetGeneration that was fully applied across all
                  nodes.
                format: int64
                type: integer
              phase:
                description: 'Current phase: Pending, Ready, Resetting, Failed.'
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: ReaperOverlay
        type: object
    served: true
    storage: true
    subresources:
      status: {}
