# Composable vServices: two ReaperDaemonJobs sharing an overlay.
#
# The first job mounts a filesystem, the second installs packages on it.
# Both share the "vservice-base" overlay so changes from the first are
# visible to the second. The `after` field ensures ordering.
#
# Prerequisites:
#   - Reaper installed on target nodes
#   - CRDs installed via Helm chart or kubectl apply
#   - Controller running
#   - ReaperOverlay "vservice-base" created (optional, for PVC-like blocking)
#
# Usage:
#   kubectl apply -f composable-vservices.yaml
#   kubectl get reaperdaemonjobs
#   kubectl get reaperpods
apiVersion: reaper.io/v1alpha1
kind: ReaperDaemonJob
metadata:
  name: mount-filesystems
spec:
  command: ["/bin/sh", "-c"]
  args:
    - |
      echo "Mounting shared filesystems..."
      mkdir -p /mnt/shared
      echo "Filesystems mounted on $(hostname)"
  overlayName: vservice-base
  nodeSelector:
    role: compute
---
apiVersion: reaper.io/v1alpha1
kind: ReaperDaemonJob
metadata:
  name: install-packages
spec:
  command: ["/bin/sh", "-c"]
  args:
    - |
      echo "Installing packages on $(hostname)..."
      echo "Packages installed successfully"
  overlayName: vservice-base
  after:
    - mount-filesystems
  nodeSelector:
    role: compute
  retryLimit: 2
