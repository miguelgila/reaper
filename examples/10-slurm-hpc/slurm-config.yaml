# Reference template — the actual ConfigMap is generated by setup.sh
# with auto-detected node names and CPU count.
#
# To use manually, replace COMPUTE_NODE_LIST and CPU_COUNT below:
#
#   kubectl create configmap slurm-config \
#     --from-literal=slurm.conf="$(cat examples/10-slurm-hpc/slurm-config.yaml)" \
#     --from-literal=cgroup.conf="CgroupPlugin=cgroup/v1"
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config
data:
  slurm.conf: |
    ClusterName=reaper-demo
    SlurmctldHost=slurmctld
    SlurmUser=root
    SlurmdUser=root
    SchedulerType=sched/backfill
    SelectType=select/cons_tres
    SlurmctldLogFile=/var/log/slurmctld.log
    SlurmdLogFile=/var/log/slurmd.log
    ProctrackType=proctrack/linuxproc
    TaskPlugin=task/none
    SlurmctldTimeout=60
    SlurmdTimeout=60
    WaitTime=30
    AuthType=auth/munge
    # Replace with actual node names and CPU count
    NodeName=COMPUTE_NODE_LIST CPUs=CPU_COUNT RealMemory=1024 State=UNKNOWN
    PartitionName=batch Nodes=ALL Default=YES MaxTime=INFINITE State=UP
  cgroup.conf: |
    CgroupPlugin=cgroup/v1
