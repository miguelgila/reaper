apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-config
data:
  slurm.conf: |
    # Minimal Slurm configuration for Kind demo
    ClusterName=reaper-demo
    SlurmctldHost=slurmctld

    # Scheduling
    SchedulerType=sched/backfill
    SelectType=select/cons_tres

    # Logging
    SlurmctldLogFile=/var/log/slurmctld.log
    SlurmdLogFile=/var/log/slurmd.log

    # Process tracking
    ProctrackType=proctrack/linuxproc

    # Timeouts
    SlurmctldTimeout=60
    SlurmdTimeout=60
    WaitTime=30

    # Authentication
    AuthType=auth/munge

    # Compute nodes — populated by setup.sh via slurmd registration
    # In production, NodeName entries would list real hostnames
    NodeName=DEFAULT CPUs=2 RealMemory=1024 State=UNKNOWN
    PartitionName=batch Nodes=ALL Default=YES MaxTime=INFINITE State=UP
