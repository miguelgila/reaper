# Slurm test: submit a batch job and wait for results.
# Runs on the slurmctld node (has Slurm client tools).
apiVersion: batch/v1
kind: Job
metadata:
  name: test-slurm-job
spec:
  backoffLimit: 0
  template:
    spec:
      nodeSelector:
        role: slurmctld
      restartPolicy: Never
      containers:
        - name: submit
          image: debian:12
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "=== Installing Slurm client ==="
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
                munge slurm-client 2>&1 | tail -5

              mkdir -p /run/munge /var/log/munge /etc/slurm

              # Set up munge (same key as controller and workers)
              cp /etc/munge-key/munge.key /etc/munge/munge.key
              chmod 400 /etc/munge/munge.key
              munged --force

              # Copy Slurm config
              cp /etc/slurm-config/slurm.conf /etc/slurm/slurm.conf
              cp /etc/slurm-config/cgroup.conf /etc/slurm/cgroup.conf 2>/dev/null || true

              echo ""
              echo "=== Slurm cluster info ==="
              sinfo

              echo ""
              echo "=== Submitting batch job ==="
              sbatch --wait --output=/tmp/slurm-out-%j.out --error=/tmp/slurm-err-%j.out \
                --wrap='echo "Hello from Slurm on $(hostname) at $(date)" && echo "Job completed successfully"'
              JOB_EXIT=$?

              echo ""
              echo "=== Job output ==="
              cat /tmp/slurm-out-*.out 2>/dev/null || echo "(no output file found)"

              if [ -s /tmp/slurm-err-*.out ] 2>/dev/null; then
                echo ""
                echo "=== Job stderr ==="
                cat /tmp/slurm-err-*.out
              fi

              echo ""
              echo "=== Job queue (should be empty) ==="
              squeue --all

              echo ""
              if [ "$JOB_EXIT" -eq 0 ]; then
                echo "=== Test PASSED ==="
              else
                echo "=== Test FAILED (exit code: $JOB_EXIT) ==="
                exit 1
              fi
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm-config
              readOnly: true
            - name: munge-key
              mountPath: /etc/munge-key
              readOnly: true
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: munge-key
          secret:
            secretName: munge-key
