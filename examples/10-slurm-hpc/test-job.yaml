# Slurm test: submit a batch job, wait for completion, and verify results.
# Runs on the slurmctld node (has Slurm client tools).
apiVersion: batch/v1
kind: Job
metadata:
  name: test-slurm-job
spec:
  backoffLimit: 0
  template:
    spec:
      nodeSelector:
        role: slurmctld
      restartPolicy: Never
      containers:
        - name: submit
          image: debian:12
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "=== Installing Slurm client ==="
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
                munge slurm-client 2>&1 | tail -5

              mkdir -p /run/munge /var/log/munge /etc/slurm

              # Set up munge (same key as controller and workers)
              cp /etc/munge-key/munge.key /etc/munge/munge.key
              chmod 400 /etc/munge/munge.key
              munged --force

              # Copy Slurm config
              cp /etc/slurm-config/slurm.conf /etc/slurm/slurm.conf
              cp /etc/slurm-config/cgroup.conf /etc/slurm/cgroup.conf 2>/dev/null || true

              echo ""
              echo "=== Slurm cluster info ==="
              sinfo

              echo ""
              echo "=== Submitting batch job ==="
              JOB_ID=$(sbatch --parsable --wrap='hostname && date && echo SUCCESS')
              echo "Submitted job $JOB_ID"

              # Wait for the job to finish
              echo "Waiting for job to complete..."
              for i in $(seq 1 60); do
                STATE=$(scontrol show job "$JOB_ID" 2>/dev/null | grep -oP 'JobState=\K\S+' || echo "UNKNOWN")
                if [ "$STATE" = "COMPLETED" ] || [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
                  break
                fi
                sleep 2
              done

              echo ""
              echo "=== Job details ==="
              scontrol show job "$JOB_ID"

              echo ""
              if [ "$STATE" = "COMPLETED" ]; then
                echo "=== Test PASSED (job $JOB_ID completed on a compute node) ==="
              else
                echo "=== Test FAILED (job $JOB_ID state: $STATE) ==="
                exit 1
              fi
          volumeMounts:
            - name: slurm-config
              mountPath: /etc/slurm-config
              readOnly: true
            - name: munge-key
              mountPath: /etc/munge-key
              readOnly: true
      volumes:
        - name: slurm-config
          configMap:
            name: slurm-config
        - name: munge-key
          secret:
            secretName: munge-key
