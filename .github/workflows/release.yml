name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.2.3)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  validate-tag:
    name: Validate Tag
    needs: resolve-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${{ needs.resolve-tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Tag version matches Cargo.toml: $TAG_VERSION"

      - name: Verify tag matches Chart.yaml version
        run: |
          TAG_VERSION="${{ needs.resolve-tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CHART_VERSION=$(grep '^version:' deploy/helm/reaper/Chart.yaml | awk '{print $2}')
          if [ "$TAG_VERSION" != "$CHART_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Chart.yaml version ($CHART_VERSION)"
            exit 1
          fi
          echo "Tag version matches Chart.yaml: $TAG_VERSION"

  build:
    name: Build (${{ matrix.target }})
    needs: [resolve-tag, validate-tag]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            musl_image: messense/rust-musl-cross:x86_64-musl
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            musl_image: messense/rust-musl-cross:aarch64-musl
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Build static binaries
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/work \
            -w /work \
            "${{ matrix.musl_image }}" \
            cargo build --release \
              --bin containerd-shim-reaper-v2 \
              --bin reaper-runtime \
              --target "${{ matrix.target }}"

      - name: Verify version in binaries
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          TAG_VERSION="${{ needs.resolve-tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          BINARY_VERSION=$(./target/${{ matrix.target }}/release/reaper-runtime --version 2>&1 | head -1)
          echo "Binary reports: $BINARY_VERSION"
          echo "$BINARY_VERSION" | grep -q "$TAG_VERSION" || {
            echo "ERROR: Binary version does not contain tag version $TAG_VERSION"
            exit 1
          }

      - name: Package tarball
        run: |
          VERSION="${{ needs.resolve-tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          DIRNAME="reaper-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIRNAME"
          cp target/${{ matrix.target }}/release/containerd-shim-reaper-v2 "$DIRNAME/"
          cp target/${{ matrix.target }}/release/reaper-runtime "$DIRNAME/"
          cp LICENSE "$DIRNAME/"
          cp README.md "$DIRNAME/"
          tar czf "${DIRNAME}.tar.gz" "$DIRNAME"
          echo "TARBALL=${DIRNAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: "*.tar.gz"

  container-images:
    name: Container Images (${{ matrix.image }})
    needs: [resolve-tag, validate-tag]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write  # Required for cosign keyless signing via GitHub OIDC
    strategy:
      matrix:
        include:
          - image: reaper-agent
            dockerfile: Dockerfile.agent
          - image: reaper-controller
            dockerfile: Dockerfile.controller
          - image: reaper-node
            dockerfile: Dockerfile.node
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build-push.outputs.digest }}

  helm-chart:
    name: Helm Chart
    needs: [resolve-tag, validate-tag]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write  # Required for cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR OCI registry (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to GHCR (cosign/Docker credentials)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: helm package deploy/helm/reaper --destination .

      - name: Push to OCI registry
        id: helm-push
        run: |
          OUTPUT=$(helm push "reaper-${{ steps.version.outputs.version }}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'Digest: \K\S+')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign chart with cosign (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/charts/reaper@${{ steps.helm-push.outputs.digest }}

  release:
    name: Create Release
    needs: [resolve-tag, build, helm-chart]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Generate release notes
        id: release-notes
        run: |
          {
            echo 'BODY<<EOF'
            git-cliff --latest --strip header
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec cp {} . \;
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Sign checksums with cosign (keyless)
        run: |
          cd artifacts
          cosign sign-blob --yes \
            --output-signature checksums-sha256.txt.sig \
            --output-certificate checksums-sha256.txt.pem \
            checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          body: ${{ steps.release-notes.outputs.BODY }}
          files: |
            artifacts/*.tar.gz
            artifacts/checksums-sha256.txt
            artifacts/checksums-sha256.txt.sig
            artifacts/checksums-sha256.txt.pem
