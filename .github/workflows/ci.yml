name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo-audit
        run: cargo audit

  cargo-test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  build-musl:
    name: Build and Cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all binaries (musl static)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            messense/rust-musl-cross:x86_64-musl \
            cargo build --release --features agent,controller \
              --bin containerd-shim-reaper-v2 \
              --bin reaper-runtime \
              --bin reaper-agent \
              --bin reaper-controller \
              --target x86_64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: musl-binaries
          path: |
            target/x86_64-unknown-linux-musl/release/containerd-shim-reaper-v2
            target/x86_64-unknown-linux-musl/release/reaper-runtime
            target/x86_64-unknown-linux-musl/release/reaper-agent
            target/x86_64-unknown-linux-musl/release/reaper-controller
          retention-days: 1

  kind-integration:
    name: kind-integration
    needs: build-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: musl-binaries
          path: target/x86_64-unknown-linux-musl/release/

      - name: Make binaries executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/*

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.30.0"

      - name: Install kind
        run: |
          [ -x "$(command -v kind)" ] && exit 0
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Run integration tests
        timeout-minutes: 30
        run: ./scripts/run-integration-tests.sh --skip-cargo

      - name: Upload integration test logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: integration-test-logs
          path: |
            /tmp/reaper-integration-logs/
            /tmp/reaper-playground-setup.log
          retention-days: 7

  example-validation:
    name: Example Validation
    needs: cargo-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          [ -x "$(command -v kind)" ] && exit 0
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.30.0"

      - name: Run example validation
        run: ./scripts/test-examples.sh --skip-cluster

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: example-validation-logs
          path: /tmp/reaper-examples-test-kubeconfig
          retention-days: 7

  # playground-release job removed: setup-playground.sh now uses Helm
  # instead of --release flag. The release-utils.sh library is retained
  # for the deprecated install-reaper.sh script.
